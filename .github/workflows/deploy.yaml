name: deploy-processamento

on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, edited]
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v6  # 1. Atualizado para v6 (melhor gestão de memória para pacotes C)
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/processamento-api:latest
          # 2. Cache inteligente via Docker Registry (Valida mudanças no requirements sem travar o build)
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/processamento-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/processamento-api:buildcache,mode=max

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Executar Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2214
          script: |
            mkdir -p ~/develop/proc-api
            cd ~/develop/proc-api
            echo "${{ secrets.ENV_FILE }}" > .env
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            cd ~/develop
            docker network inspect traefik-network >/dev/null 2>&1 || docker network create traefik-network
            
            # 3. Pull apenas do serviço restrito
             docker compose -f docker-compose-deploy.yml pull api-python-rest taskiq-worker-ia
            
            # 4. Força a recriação do ambiente com a imagem nova baixada do Docker Hub
            docker compose -f docker-compose-deploy.yml up -d --force-recreate --remove-orphans api-python-rest taskiq-worker-ia
