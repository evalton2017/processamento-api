name: deploy-processamento

on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, edited]
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v6  # 1. Atualizado para v6 (melhor gestão de memória para pacotes C)
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/processamento-api:latest
          # 2. Cache inteligente via Docker Registry (Valida mudanças no requirements sem travar o build)
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/processamento-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/processamento-api:buildcache,mode=max

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Executar Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2214
          script: |
            # 1. Entra na pasta base do deploy onde o docker-compose-deploy.yml reside
            cd ~/develop
            
            # 2. Garante que a pasta proc-api existe e joga o .env atualizado lá dentro
            mkdir -p proc-api
            echo "${{ secrets.ENV_FILE }}" > ./proc-api/.env
            
            # 3. Autentica no Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            
            # 4. Garante a existência da rede do Traefik se ela não existir
            docker network inspect root_traefik-net >/dev/null 2>&1 || docker network create root_traefik-net
            
            # 5. Faz o pull APENAS das imagens dos dois serviços atualizados
            docker compose -f docker-compose-deploy.yml pull api-python-rest taskiq-worker-ia
            
            # 6. Recria e sobe ESTRITAMENTE os dois contêineres mapeados, sem tocar nos outros
            docker compose -f docker-compose-deploy.yml up -d --force-recreate --no-deps api-python-rest taskiq-worker-ia
            
            # 7. Limpa imagens órfãs (<none>) para não estourar o disco da VPS
            docker image prune -f
